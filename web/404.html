<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <meta name="robots" content="noindex,nofollow" />
    <title>404</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-soft: #eef4ff;
        --text: #101828;
        --muted: #667085;
        --line: #d7dce5;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
        --shadow: 0 24px 70px rgba(16, 24, 40, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(37, 99, 235, 0.1), transparent 38%),
          radial-gradient(circle at 80% 20%, rgba(20, 184, 166, 0.12), transparent 34%),
          var(--bg);
        color: var(--text);
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "PingFang SC",
          "Microsoft YaHei",
          sans-serif;
      }

      main {
        width: min(100%, 760px);
        padding: 48px;
        border: 1px solid rgba(215, 220, 229, 0.9);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 28px;
        padding: 8px 12px;
        border: 1px solid #bfd2ff;
        border-radius: 999px;
        background: var(--surface-soft);
        color: var(--accent-dark);
        font-size: 13px;
        font-weight: 700;
      }

      .status::before {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        content: "";
      }

      h1 {
        margin: 0;
        font-size: clamp(64px, 14vw, 132px);
        line-height: 0.9;
        letter-spacing: 0;
      }

      h2 {
        max-width: 600px;
        margin: 24px 0 0;
        font-size: clamp(24px, 5vw, 36px);
        line-height: 1.18;
        letter-spacing: 0;
      }

      p {
        max-width: 560px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.75;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 34px;
      }

      a,
      button {
        min-height: 44px;
        border-radius: 6px;
        font: inherit;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        background: var(--accent);
        color: #ffffff;
        text-decoration: none;
      }

      a:hover {
        background: var(--accent-dark);
      }

      button {
        padding: 0 16px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
      }

      button:hover {
        border-color: #aab4c3;
        background: #f9fafb;
      }

      @media (max-width: 560px) {
        body {
          padding: 20px;
        }

        main {
          padding: 32px 24px;
        }

        .actions {
          flex-direction: column;
        }

        a,
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="status">访问受限</div>
      <h1>404</h1>
      <h2>页面不存在或当前访问未通过校验</h2>
      <p>
        请检查访问地址是否正确，或确认当前页面已经加载有效的访问配置。
      </p>
      <div class="actions">
        <a href="/">返回首页</a>
        <button type="button" onclick="window.location.reload()">重新加载</button>
      </div>
    </main>
  </body>
</html>
